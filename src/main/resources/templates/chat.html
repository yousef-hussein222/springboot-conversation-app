<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Conversation App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>

</head>
<body>
<div class="container mt-4">
    <h1 class="text-center">Real-Time Conversation App</h1>
    <div id="conversation"
         class="border rounded p-3 mb-3"
         style="height: 300px;overflow-y: auto;">
    </div>
    <div class="input-group mb-3">
        <label for="senderInput"></label><input type="text" class="form-control" id="senderInput"
                                               placeholder="Your name..."/>
    </div>

    <div class="input-group mb-3">
        <label for="messageInput"></label><input type="text" class="form-control" id="messageInput"
                                                placeholder="Type a message..."/>
        <div class="input-group-append">
            <button class="btn-primary" type="button" id="sendMessage">Send</button>
        </div>
    </div>
</div>

</body>
<script>

    function setConnected(connected) {
        document.getElementById("sendMessage").disabled = !connected;
    }

    function connect() {
        var socket = new SockJS('/chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            setConnected(true);
            stompClient.subscribe('/topic/message', function (message) {
                showMessage(JSON.parse(message.body));
            });
        });
    }


    function showMessage(msg) {
        var conversation = document.getElementById('conversation');
        var messageElement = document.createElement('div');
        messageElement.textContent = msg.sender + ': ' + msg.content;
        messageElement.class = "border-bottom mb-1";
        conversation.append(messageElement);
        conversation.scrollTop = conversation.scrollHeight;

    }

    function sendMessage() {
        var senderInput = document.getElementById('senderInput').value;
        var messageInput = document.getElementById('messageInput').value;
        var chatMessage = {
            sender: senderInput,
            content: messageInput
        }
        stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
        document.getElementById('messageInput').value = '';
    }
    document.getElementById("sendMessage").onclick = sendMessage ;
    window.onload = connect;
</script>
</html>
